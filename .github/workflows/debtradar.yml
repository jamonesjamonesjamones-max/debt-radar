name: DebtRadar Code Quality

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  debt-check:
    runs-on: ubuntu-latest
    name: Check Code Quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DebtRadar
        run: |
          pip install typer rich pathspec tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-typescript pydantic fastapi uvicorn

      - name: Run DebtRadar Scan
        id: scan
        run: |
          cd backend
          python cli.py scan . --output json --workers 4 --fail-below B > /tmp/debtradar-report.json || echo "scan_failed=true" >> $GITHUB_OUTPUT
          GRADE=$(python -c "import json; print(json.load(open('/tmp/debtradar-report.json'))['summary']['grade'])")
          SCORE=$(python -c "import json; print(json.load(open('/tmp/debtradar-report.json'))['summary']['average_score'])")
          echo "grade=$GRADE" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const grade = '${{ steps.scan.outputs.grade }}' || '?';
            const score = '${{ steps.scan.outputs.score }}' || '?';
            const failed = '${{ steps.scan.outputs.scan_failed }}' === 'true';
            const gradeEmoji = { A: '🟢', B: '🟡', C: '🟠', D: '🔴', F: '⚫' }[grade] || '❓';
            const status = failed ? '❌ **FAIL**' : '✅ **PASS**';

            const body = `## 📡 DebtRadar Code Quality Report

            ${status} ${gradeEmoji} **Grade: ${grade}** (Score: ${score}/100)

            ${failed ? `⚠️ This PR does not meet the minimum quality threshold (B).` : `✅ Code quality meets the minimum threshold.`}

            ---
            <sub>Generated by DebtRadar GitHub Action</sub>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if below threshold
        if: steps.scan.outputs.scan_failed == 'true'
        run: |
          echo "❌ Code quality check failed: Grade ${{ steps.scan.outputs.grade }} is below threshold"
          exit 1
